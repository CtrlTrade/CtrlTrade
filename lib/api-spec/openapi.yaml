openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CtrlTrade SaaS Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: tenant
  - name: subscription
  - name: billing
  - name: payment
  - name: trade-categories
  - name: pricing
  - name: onboarding
  - name: admin
  - name: customers
  - name: quotes
  - name: jobs
  - name: schedule
  - name: fleet
  - name: compliance
  - name: team
  - name: pos
paths:
  /v1/pos/login:
    post:
      operationId: posLogin
      tags: [pos]
      summary: Authenticate a field/control user for the CtrlTradePos till
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSession"

  /v1/pos/me:
    get:
      operationId: getPosSession
      tags: [pos]
      summary: Resolve the current POS session from the bearer token
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSession"

  /v1/pos/jobs:
    get:
      operationId: listPosJobs
      tags: [pos]
      summary: Jobs assigned to the current user for today
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PosJob"

  /v1/pos/sales:
    get:
      operationId: listPosSales
      tags: [pos]
      summary: Recent sales recorded on this till
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PosSale"
    post:
      operationId: createPosSale
      tags: [pos]
      summary: Capture a sale (line items + tender) from the field
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosSaleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSale"

  /v1/pos/sales/{saleId}/receipt:
    post:
      operationId: sendPosReceipt
      tags: [pos]
      parameters:
        - in: path
          name: saleId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosReceiptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosReceiptReceipt"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/pricing:
    get:
      operationId: getPricing
      tags: [pricing]
      summary: Public pricing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pricing"

  /v1/trade-categories:
    get:
      operationId: listTradeCategories
      tags: [trade-categories]
      summary: List trade categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeCategory"

  /v1/auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create tenant, owner user, and trial subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupPayload"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "204":
          description: Logged out

  /v1/auth/me:
    get:
      operationId: getSession
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /v1/payment/setup-intent:
    post:
      operationId: createSetupIntent
      tags: [payment]
      summary: Create Stripe SetupIntent for saving a payment method during signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupIntentInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupIntent"

  /v1/tenant:
    get:
      operationId: getTenant
      tags: [tenant]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenant]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /v1/tenant/cancel:
    post:
      operationId: cancelTenant
      tags: [tenant]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancellationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationReceipt"

  /v1/tenant/sync-stripe:
    post:
      operationId: syncTenantFromStripe
      tags: [tenant]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/subscription:
    get:
      operationId: getSubscription
      tags: [subscription]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
    patch:
      operationId: updateSubscriptionQuantities
      tags: [subscription]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionQuantities"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/subscription/reactivate:
    post:
      operationId: reactivateSubscription
      tags: [subscription]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/billing/overview:
    get:
      operationId: getBillingOverview
      tags: [billing]
      summary: Subscription, plan items, payment method, and upcoming invoice
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingOverview"

  /v1/billing/invoices:
    get:
      operationId: listBillingInvoices
      tags: [billing]
      summary: List past invoices for the tenant
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingInvoice"

  /v1/billing/update-payment-method:
    post:
      operationId: createBillingPaymentMethodSetup
      tags: [billing]
      summary: Create a SetupIntent so the tenant can update their card
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSetupIntent"

  /v1/onboarding:
    get:
      operationId: getOnboarding
      tags: [onboarding]
      responses:
        "200":
          description: OK
          content:
