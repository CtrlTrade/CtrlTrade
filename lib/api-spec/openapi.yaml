components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Pricing:
      type: object
      required: [currency, controlSeat, fieldSeat, till, trialDays]
      properties:
        currency: { type: string }
        controlSeat: { $ref: "#/components/schemas/PricedItem" }
        fieldSeat: { $ref: "#/components/schemas/PricedItem" }
        till: { $ref: "#/components/schemas/PricedItem" }
        trialDays: { type: integer }

    PricedItem:
      type: object
      required: [name, amount, currency, interval, features]
      properties:
        name: { type: string }
        amount: { type: number }
        currency: { type: string }
        interval: { type: string }
        features:
          type: array
          items: { type: string }

    TradeCategory:
      type: object
      required: [id, slug, name, jobTypes]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        jobTypes:
          type: array
          items: { type: string }

    SignupPayload:
      type: object
      required: [company, ownerName, ownerEmail, ownerPassword, controlSeats, fieldSeats, tills, tradeCategorySlugs, paymentMethodId]
      properties:
        company:
          type: object
          required: [name]
          properties:
            name: { type: string, minLength: 1 }
            country: { type: string }
            companyNumber: { type: ["string", "null"] }
            phone: { type: ["string", "null"] }
            addressLine1: { type: ["string", "null"] }
            city: { type: ["string", "null"] }
            postcode: { type: ["string", "null"] }
        ownerName: { type: string, minLength: 1 }
        ownerEmail: { type: string, format: email }
        ownerPassword: { type: string, minLength: 8 }
        controlSeats: { type: integer, minimum: 1 }
        fieldSeats: { type: integer, minimum: 0 }
        tills: { type: integer, minimum: 0 }
        tradeCategorySlugs:
          type: array
          items: { type: string }
        paymentMethodId: { type: string }

    LoginCredentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }

    Session:
      type: object
      required: [user]
      properties:
        user: { $ref: "#/components/schemas/SessionUser" }
        tenant:
          oneOf:
            - $ref: "#/components/schemas/Tenant"
            - type: "null"
        impersonation:
          oneOf:
            - $ref: "#/components/schemas/ImpersonationContext"
            - type: "null"

    ImpersonationContext:
      type: object
      required: [tenantId, tenantName, impersonatorEmail, startedAt]
      properties:
        tenantId: { type: string }
        tenantName: { type: string }
        impersonatorEmail: { type: string }
        startedAt: { type: string, format: date-time }

    SessionUser:
      type: object
      required: [id, email, name, role, isSuperAdmin]
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        role: { type: string }
        isSuperAdmin: { type: boolean }
        seatType:
          type: ["string", "null"]
          description: "control | field | null"

    Tenant:
      type: object
      required: [id, name, slug, status, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status:
          type: string
          description: "trial | active | past_due | paused | cancelled"
        createdAt: { type: string, format: date-time }
        country: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        addressLine1: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        postcode: { type: ["string", "null"] }
        brandColor: { type: ["string", "null"] }
        logoUrl: { type: ["string", "null"] }
        logoPortalUrl: { type: ["string", "null"] }
        logoPosUrl: { type: ["string", "null"] }
        faviconUrl: { type: ["string", "null"] }
        primaryColor: { type: ["string", "null"] }
        accentColor: { type: ["string", "null"] }
        surfaceColor: { type: ["string", "null"] }
        fontFamily: { type: ["string", "null"] }
        brandTemplates:
          anyOf:
            - type: "null"
            - $ref: "#/components/schemas/BrandTemplates"
        leadCaptureAllowedOrigins:
          type: array
          items: { type: string }
        tradeCategorySlugs:
          type: array
          items: { type: string }

    TenantUpdate:
      type: object
      properties:
        name: { type: string }
        country: { type: string }
        phone: { type: string }
        addressLine1: { type: string }
        city: { type: string }
        postcode: { type: string }
        brandColor: { type: string }
        logoUrl: { type: string }
        logoPortalUrl: { type: string }
        logoPosUrl: { type: string }
        faviconUrl: { type: string }
        primaryColor: { type: string }
        accentColor: { type: string }
        surfaceColor: { type: string }
        fontFamily: { type: string }
        brandTemplates: { $ref: "#/components/schemas/BrandTemplates" }
        leadCaptureAllowedOrigins:
          type: array
          items: { type: string }
        tradeCategorySlugs:
          type: array
          items: { type: string }

    BrandTemplates:
      type: object
      properties:
        invoice:
          type: object
          properties:
            header: { type: string }
            footer: { type: string }
            notes: { type: string }
        quote:
          type: object
          properties:
            header: { type: string }
            footer: { type: string }
            notes: { type: string }
        email:
          type: object
          properties:
            header: { type: string }
            signature: { type: string }
        posReceipt:
          type: object
          properties:
            header: { type: string }
            footer: { type: string }

    Branding:
      type: object
      required: [tenantId]
      properties:
        tenantId: { type: string }
        logoUrl: { type: ["string", "null"] }
        logoPortalUrl: { type: ["string", "null"] }
        logoPosUrl: { type: ["string", "null"] }
        faviconUrl: { type: ["string", "null"] }
        primaryColor: { type: ["string", "null"] }
        accentColor: { type: ["string", "null"] }
        surfaceColor: { type: ["string", "null"] }
        brandColor: { type: ["string", "null"] }
        fontFamily: { type: ["string", "null"] }
        brandTemplates:
          anyOf:
            - type: "null"
            - $ref: "#/components/schemas/BrandTemplates"

    BrandingUpdate:
      type: object
      properties:
        logoUrl: { type: ["string", "null"] }
        logoPortalUrl: { type: ["string", "null"] }
        logoPosUrl: { type: ["string", "null"] }
        faviconUrl: { type: ["string", "null"] }
        primaryColor: { type: ["string", "null"] }
        accentColor: { type: ["string", "null"] }
        surfaceColor: { type: ["string", "null"] }
        brandColor: { type: ["string", "null"] }
        fontFamily: { type: ["string", "null"] }
        brandTemplates: { $ref: "#/components/schemas/BrandTemplates" }

    UsageRow:
      type: object
      required: [kind, count]
      properties:
        kind: { type: string }
        count: { type: integer }

    TenantUsage:
      type: object
      required: [tenantId, periodStart, periodEnd, rows]
      properties:
        tenantId: { type: string }
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }
        rows:
          type: array
          items: { $ref: "#/components/schemas/UsageRow" }

    AdminWorkerJob:
      type: object
      required: [id, kind, status, attempts, maxAttempts, runAt, createdAt, updatedAt]
      properties:
        id: { type: string }
        kind: { type: string }
        status: { type: string }
        attempts: { type: integer }
        maxAttempts: { type: integer }
        runAt: { type: string, format: date-time }
        startedAt: { type: ["string", "null"], format: date-time }
        completedAt: { type: ["string", "null"], format: date-time }
        lastError: { type: ["string", "null"] }
        scheduleKey: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AdminWorkerKindStat:
      type: object
      required: [kind, queued, running, done, failed, dead]
      properties:
        kind: { type: string }
        queued: { type: integer }
        running: { type: integer }
        done: { type: integer }
        failed: { type: integer }
        dead: { type: integer }

    AdminWorkers:
      type: object
      required: [depth, byKind, recent]
      properties:
        depth:
          type: object
          required: [queued, running, done, failed, dead]
          properties:
            queued: { type: integer }
            running: { type: integer }
            done: { type: integer }
            failed: { type: integer }
            dead: { type: integer }
        byKind:
          type: array
          items: { $ref: "#/components/schemas/AdminWorkerKindStat" }
        recent:
          type: array
          items: { $ref: "#/components/schemas/AdminWorkerJob" }

    AdminUsageTenantRow:
      type: object
      required: [tenantId, tenantName, rows, total]
      properties:
        tenantId: { type: string }
        tenantName: { type: string }
        total: { type: integer }
        rows:
          type: array
          items: { $ref: "#/components/schemas/UsageRow" }

    AdminUsage:
      type: object
      required: [periodStart, periodEnd, totals, byTenant]
      properties:
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }
        totals:
          type: array
          items: { $ref: "#/components/schemas/UsageRow" }
        byTenant:
          type: array
          items: { $ref: "#/components/schemas/AdminUsageTenantRow" }

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL: { type: string }
        objectPath: { type: string }
        metadata:
          type: object
          properties:
            name: { type: string }
            size: { type: integer }
            contentType: { type: string }

    FileInput:
      type: object
      required: [url, kind]
      properties:
        url: { type: string, minLength: 1 }
        kind: { type: string, minLength: 1 }
        parentKind: { type: string }
        parentId: { type: string }
        name: { type: string }
        label: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }

    FileMeta:
      type: object
      required: [id, tenantId, url, kind, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        url: { type: string }
        kind: { type: string }
        parentKind: { type: ["string", "null"] }
        parentId: { type: ["string", "null"] }
        name: { type: ["string", "null"] }
        label: { type: ["string", "null"] }
        mimeType: { type: ["string", "null"] }
        sizeBytes: { type: ["integer", "null"] }
        uploadedByUserId: { type: ["string", "null"] }
        uploadedByLabel: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }


    CancellationRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }
        feedback: { type: string }

    CancellationReceipt:
      type: object
      required: [tenantId, cancelledAt, exportUrl]
      properties:
        tenantId: { type: string }
        cancelledAt: { type: string, format: date-time }
        exportUrl: { type: string }

    SetupIntentInput:
      type: object
      required: [email, companyName]
      properties:
        email: { type: string, format: email }
        companyName: { type: string }

    SetupIntent:
      type: object
      required: [clientSecret, customerId]
      properties:
        clientSecret: { type: string }
        customerId: { type: string }

    Subscription:
      type: object
      required: [id, tenantId, status, controlSeats, fieldSeats, tills, currency, monthlyTotal, currentPeriodEnd, trialEndsAt, stripeCustomerId, stripeSubscriptionId, cancelAtPeriodEnd]
      properties:
        id: { type: string }
        tenantId: { type: string }
        status: { type: string }
        controlSeats: { type: integer }
        fieldSeats: { type: integer }
        tills: { type: integer }
        currency: { type: string }
        monthlyTotal: { type: number }
        currentPeriodEnd:
          type: ["string", "null"]
          format: date-time
        trialEndsAt:
          type: ["string", "null"]
          format: date-time
        stripeCustomerId: { type: string }
        stripeSubscriptionId: { type: string }
        cancelAtPeriodEnd: { type: boolean }

    SubscriptionQuantities:
      type: object
      required: [controlSeats, fieldSeats, tills]
      properties:
        controlSeats: { type: integer, minimum: 1 }
        fieldSeats: { type: integer, minimum: 0 }
        tills: { type: integer, minimum: 0 }

    BillingPlanItem:
      type: object
      required: [key, label, quantity, unitAmount, subtotal, currency]
      properties:
        key: { type: string }
        label: { type: string }
        quantity: { type: integer }
        unitAmount: { type: number }
        subtotal: { type: number }
        currency: { type: string }

    BillingPaymentMethod:
      type: object
      required: [id, brand, last4, expMonth, expYear]
      properties:
        id: { type: string }
        brand: { type: string }
        last4: { type: string }
        expMonth: { type: integer }
        expYear: { type: integer }

    BillingUpcomingInvoice:
      type: object
      required: [amountDue, currency]
      properties:
        amountDue: { type: number }
        currency: { type: string }
        periodStart:
          type: ["string", "null"]
          format: date-time
        periodEnd:
          type: ["string", "null"]
          format: date-time
        nextPaymentAttempt:
          type: ["string", "null"]
          format: date-time

    BillingOverview:
      type: object
      required: [subscription, planItems, currency, monthlyTotal]
      properties:
        subscription: { $ref: "#/components/schemas/Subscription" }
        planItems:
          type: array
          items: { $ref: "#/components/schemas/BillingPlanItem" }
        currency: { type: string }
        monthlyTotal: { type: number }
        paymentMethod:
          oneOf:
            - $ref: "#/components/schemas/BillingPaymentMethod"
            - type: "null"
        upcomingInvoice:
          oneOf:
            - $ref: "#/components/schemas/BillingUpcomingInvoice"
            - type: "null"

    BillingInvoice:
      type: object
      required: [id, status, total, currency, created]
      properties:
        id: { type: string }
        number: { type: ["string", "null"] }
        status: { type: string }
        total: { type: number }
        currency: { type: string }
        created: { type: string, format: date-time }
        periodStart:
          type: ["string", "null"]
          format: date-time
        periodEnd:
          type: ["string", "null"]
          format: date-time
        hostedInvoiceUrl: { type: ["string", "null"] }
        invoicePdf: { type: ["string", "null"] }

    BillingSetupIntent:
      type: object
      required: [clientSecret, customerId]
      properties:
        clientSecret: { type: string }
        customerId: { type: string }

    OnboardingState:
      type: object
      required: [items, percentComplete]
      properties:
        percentComplete: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/OnboardingItem" }

    OnboardingItem:
      type: object
      required: [key, label, description, complete]
      properties:
        key: { type: string }
        label: { type: string }
        description: { type: string }
        complete: { type: boolean }
        href: { type: ["string", "null"] }

    AdminDashboard:
      type: object
      required: [mrr, arr, currency, activeTrials, pastDue, failedPaymentsLast30d, upcomingRenewals7d, activeTenants, totalTenants, activeControlSeats, activeFieldSeats, activeTills, revenueByLine]
      properties:
        mrr: { type: number }
        arr: { type: number }
        currency: { type: string }
        activeTrials: { type: integer }
        pastDue: { type: integer }
