  /v1/admin/tenants/{tenantId}/cancel:
    post:
      operationId: adminCancelTenant
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/admin/tenants/{tenantId}/reactivate:
    post:
      operationId: adminReactivateTenant
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/admin/tenants/{tenantId}/sync-stripe:
    post:
      operationId: adminSyncTenant
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/team:
    get:
      operationId: listTeam
      tags: [team]
      summary: List members of current tenant
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
