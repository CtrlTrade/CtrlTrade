        name: quoteId
        required: true
        schema: { type: string }
    post:
      operationId: acceptQuote
      tags: [quotes]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }

  /v1/quotes/{quoteId}/convert:
    parameters:
      - in: path
        name: quoteId
        required: true
        schema: { type: string }
    post:
      operationId: convertQuoteToJob
      tags: [quotes]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteConvertInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }

  /v1/jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/JobSummary" }
    post:
      operationId: createJob
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JobInput" }
