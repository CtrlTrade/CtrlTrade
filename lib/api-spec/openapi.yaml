          content:
            application/json:
              schema:
                type: object
                required: [voicemail]
                properties:
                  voicemail: { $ref: "#/components/schemas/Voicemail" }

  # ---- CtrlTradePos® licensing & terminals (tenant) ----------------------
  /v1/pos-licences:
    get:
      operationId: listPosLicences
      tags: [pos-licensing]
      summary: List this tenant's POS till licences and their terminals
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosLicenceList" }
  /v1/pos-licences/request:
    post:
      operationId: requestExtraTill
      tags: [pos-licensing]
      summary: Request an additional till licence (adds a billable till)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequestExtraTillInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosLicence" }
  /v1/pos-licences/{licenceId}:
    patch:
      operationId: updatePosLicenceBranch
      tags: [pos-licensing]
      summary: Assign a till licence to a branch
      parameters:
        - in: path
          name: licenceId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignLicenceBranchInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosLicence" }
  /v1/pos-terminals:
    post:
      operationId: registerPosTerminal
      tags: [pos-licensing]
      summary: Register or create a till terminal and bind it to a licence
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterPosTerminalInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosTerminal" }
  /v1/pos-terminals/{terminalId}:
    patch:
      operationId: updatePosTerminal
      tags: [pos-licensing]
      summary: Rename, re-branch, set mode, or deactivate a terminal
      parameters:
        - in: path
          name: terminalId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePosTerminalInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosTerminal" }
  /v1/pos-terminals/validate:
    post:
      operationId: validatePosLicence
      tags: [pos-licensing]
      summary: Validate a licence key for a terminal on till open (web surface)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PosLicenceValidationRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosLicenceValidationResult" }

  # ---- CtrlTradePos® licensing (super admin) -----------------------------
  /v1/admin/tenants/{tenantId}/pos-licences:
    get:
      operationId: adminListPosLicences
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosLicenceList" }
    post:
      operationId: adminIssuePosLicence
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IssuePosLicenceInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosLicence" }
  /v1/admin/pos-licences/{licenceId}:
    patch:
      operationId: adminUpdatePosLicence
      tags: [admin]
      summary: Suspend, reactivate, revoke or re-branch a licence
      parameters:
        - in: path
          name: licenceId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminUpdatePosLicenceInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PosLicence" }

components:
  schemas:
    PosTerminal:
      type: object
      required: [id, tenantId, terminalCode, name, mode, status, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        branchId: { type: string, nullable: true }
        branchName: { type: string, nullable: true }
        licenceId: { type: string, nullable: true }
        terminalCode: { type: string }
        name: { type: string }
        mode: { type: string, enum: [trade_counter, showroom, warehouse] }
        status: { type: string, enum: [active, inactive] }
        registeredAt: { type: string, nullable: true }
        lastSeenAt: { type: string, nullable: true }
        createdAt: { type: string }

    PosLicence:
      type: object
      required: [id, tenantId, licenceKey, type, status, createdAt, terminals]
      properties:
        id: { type: string }
        tenantId: { type: string }
        branchId: { type: string, nullable: true }
        branchName: { type: string, nullable: true }
        licenceKey: { type: string }
        type: { type: string, enum: [web, desktop, hybrid] }
        status: { type: string, enum: [active, trial, suspended, expired, revoked, read_only] }
        trialEndsAt: { type: string, nullable: true }
        expiresAt: { type: string, nullable: true }
        lastCheckAt: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string }
        terminals:
          type: array
          items: { $ref: "#/components/schemas/PosTerminal" }

    PosLicenceList:
      type: object
      required: [licences, monthlyTotalPence, currency, pricePerTillPence]
      properties:
        licences:
          type: array
          items: { $ref: "#/components/schemas/PosLicence" }
        monthlyTotalPence: { type: integer }
        pricePerTillPence: { type: integer }
        currency: { type: string }

    IssuePosLicenceInput:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [web, desktop, hybrid] }
        branchId: { type: string, nullable: true }
        status: { type: string, enum: [active, trial] }
        trialDays: { type: integer, nullable: true }
        notes: { type: string, nullable: true }

    AdminUpdatePosLicenceInput:
      type: object
      properties:
        status: { type: string, enum: [active, trial, suspended, expired, revoked, read_only] }
        branchId: { type: string, nullable: true }
        notes: { type: string, nullable: true }

    AssignLicenceBranchInput:
      type: object
      properties:
        branchId: { type: string, nullable: true }

    RequestExtraTillInput:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [web, desktop, hybrid] }
        branchId: { type: string, nullable: true }
        name: { type: string, nullable: true }

    RegisterPosTerminalInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        licenceKey: { type: string, nullable: true }
        licenceId: { type: string, nullable: true }
        branchId: { type: string, nullable: true }
        mode: { type: string, enum: [trade_counter, showroom, warehouse] }

    UpdatePosTerminalInput:
      type: object
      properties:
        name: { type: string }
        branchId: { type: string, nullable: true }
        mode: { type: string, enum: [trade_counter, showroom, warehouse] }
        status: { type: string, enum: [active, inactive] }
        licenceId: { type: string, nullable: true }

    PosLicenceValidationRequest:
      type: object
      required: [licenceKey]
      properties:
        licenceKey: { type: string }
        terminalCode: { type: string, nullable: true }
        surface: { type: string, enum: [web, desktop] }

    PosLicenceValidationResult:
      type: object
      required: [valid, mode, status]
      properties:
        valid: { type: boolean }
        status: { type: string }
        mode: { type: string, enum: [full, read_only, locked] }
        message: { type: string, nullable: true }
        licence: { $ref: "#/components/schemas/PosLicence" }
        terminal: { $ref: "#/components/schemas/PosTerminal" }

    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Pricing:
      type: object
      required: [currency, controlSeat, fieldSeat, till, trialDays]
      properties:
        currency: { type: string }
        controlSeat: { $ref: "#/components/schemas/PricedItem" }
        fieldSeat: { $ref: "#/components/schemas/PricedItem" }
        till: { $ref: "#/components/schemas/PricedItem" }
        trialDays: { type: integer }

    PricedItem:
      type: object
      required: [name, amount, currency, interval, features]
      properties:
        name: { type: string }
        amount: { type: number }
        currency: { type: string }
        interval: { type: string }
        features:
          type: array
          items: { type: string }

    TradeCategory:
      type: object
      required: [id, slug, name, jobTypes]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        jobTypes:
          type: array
          items: { type: string }

    SignupPayload:
      type: object
      required: [company, ownerName, ownerEmail, ownerPassword, controlSeats, fieldSeats, tills, tradeCategorySlugs, paymentMethodId]
      properties:
        company:
          type: object
          required: [name]
          properties:
            name: { type: string, minLength: 1 }
            country: { type: string }
            companyNumber: { type: ["string", "null"] }
            phone: { type: ["string", "null"] }
            addressLine1: { type: ["string", "null"] }
            city: { type: ["string", "null"] }
            postcode: { type: ["string", "null"] }
            website: { type: ["string", "null"] }
            contactName: { type: ["string", "null"] }
            vatNumber: { type: ["string", "null"] }
        ownerName: { type: string, minLength: 1 }
        ownerEmail: { type: string, format: email }
        ownerPassword: { type: string, minLength: 8 }
        controlSeats: { type: integer, minimum: 1 }
        fieldSeats: { type: integer, minimum: 0 }
        tills: { type: integer, minimum: 0 }
        tradeCategorySlugs:
          type: array
          items: { type: string }
        paymentMethodId: { type: string }
        industrySlug: { type: string }
        businessType: { type: string }
        hasTradeShop: { type: boolean }
        hasMobileWorkforce: { type: boolean }
        appointmentBookingEnabled: { type: boolean }
        multiBranchEnabled: { type: boolean }
        vatRegistered: { type: boolean }
        accountingProvider: { type: string }
        aiModulesEnabled:
          type: array
          items: { type: string }
        communicationChannels:
          type: array
          items: { type: string }
        posEnabled: { type: boolean }

    LoginCredentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }

    PosLoginCredentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }
        licenceKey: { type: string, nullable: true }
        terminalCode: { type: string, nullable: true }
        surface: { type: string, enum: [web, desktop] }

    TotpSetup:
      type: object
      required: [otpAuthUri, secret]
      properties:
        otpAuthUri: { type: string }
        secret: { type: string }

    TotpCodeInput:
      type: object
      required: [code]
      properties:
        code: { type: string }

    TotpChallengeInput:
      type: object
      properties:
        code: { type: string }
        recoveryCode: { type: string }

    TotpEnrolResult:
      type: object
      required: [recoveryCodes]
      properties:
        recoveryCodes:
          type: array
          items: { type: string }

    TotpRecoveryCodes:
      type: object
      required: [recoveryCodes]
      properties:
        recoveryCodes:
          type: array
          items: { type: string }

    Session:
      type: object
      required: [user]
      properties:
        user: { $ref: "#/components/schemas/SessionUser" }
        tenant:
          oneOf:
            - $ref: "#/components/schemas/Tenant"
            - type: "null"
        impersonation:
          oneOf:
            - $ref: "#/components/schemas/ImpersonationContext"
            - type: "null"
        twoFactorRequired: { type: boolean }
        twoFactorSetupRequired: { type: boolean }

    ImpersonationContext:
      type: object
      required: [tenantId, tenantName, impersonatorEmail, startedAt]
      properties:
        tenantId: { type: string }
        tenantName: { type: string }
        impersonatorEmail: { type: string }
        startedAt: { type: string, format: date-time }

    SessionUser:
      type: object
      required: [id, email, name, role, isSuperAdmin, totpEnabled]
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        role: { type: string }
        isSuperAdmin: { type: boolean }
        totpEnabled: { type: boolean }
        seatType:
          type: ["string", "null"]
          description: "control | field | null"

    IndustryJobTypeInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        durationHours: { type: integer }

    IndustryChecklistInput:
      type: object
      required: [name, items]
      properties:
        name: { type: string }
        description: { type: string }
        items:
          type: array
          items: { type: string }

    IndustryDocumentTemplateInput:
      type: object
      required: [name, documentType]
      properties:
        name: { type: string }
        description: { type: string }
        documentType: { type: string }
        required: { type: boolean }

    Industry:
      type: object
      required: [id, slug, name, sortOrder]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        icon: { type: ["string", "null"] }
        sortOrder: { type: integer }

    IndustryDetail:
      type: object
      required: [id, slug, name, sortOrder, jobTypes, customFields, checklists, quoteTemplates, documentTemplates]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        sortOrder: { type: integer }
        jobTypes:
          type: array
          items:
            type: object
            required: [id, name, sortOrder]
            properties:
              id: { type: string }
              name: { type: string }
              description: { type: ["string", "null"] }
              durationHours: { type: ["integer", "null"] }
              sortOrder: { type: integer }
        customFields:
          type: array
          items:
            type: object
            required: [id, label, fieldType, required, sortOrder]
            properties:
              id: { type: string }
              label: { type: string }
              fieldType: { type: string }
              required: { type: boolean }
              sortOrder: { type: integer }
        checklists:
          type: array
          items:
            type: object
            required: [id, name, items, sortOrder]
            properties:
              id: { type: string }
              name: { type: string }
              description: { type: ["string", "null"] }
              items:
                type: array
                items: { type: string }
              sortOrder: { type: integer }
        quoteTemplates:
          type: array
          items:
            type: object
            required: [id, name, sortOrder]
            properties:
              id: { type: string }
              name: { type: string }
              description: { type: ["string", "null"] }
              notes: { type: ["string", "null"] }
              sortOrder: { type: integer }
        documentTemplates:
          type: array
          items:
            type: object
            required: [id, name, documentType, required, sortOrder]
            properties:
              id: { type: string }
              name: { type: string }
              description: { type: ["string", "null"] }
              documentType: { type: string }
              required: { type: boolean }
              sortOrder: { type: integer }

    TenantModules:
      type: object
      properties:
        industrySlug: { type: ["string", "null"] }
        businessType: { type: ["string", "null"] }
        hasTradeShop: { type: boolean }
        hasMobileWorkforce: { type: boolean }
        appointmentBookingEnabled: { type: boolean }
        multiBranchEnabled: { type: boolean }
        vatRegistered: { type: boolean }
        accountingProvider: { type: ["string", "null"] }
        aiModulesEnabled:
          type: array
          items: { type: string }
        communicationChannels:
          type: array
          items: { type: string }
        posEnabled: { type: boolean }

    TenantTradeProfile:
      type: object
      required: [tradeSlugs]
      properties:
        tradeSlugs:
          type: array
          items: { type: string }

    Tenant:
      type: object
      required: [id, name, slug, status, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status:
          type: string
          description: "trial | active | past_due | paused | cancelled"
        createdAt: { type: string, format: date-time }
        country: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        addressLine1: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        postcode: { type: ["string", "null"] }
        industryId: { type: ["string", "null"] }
        industrySlug: { type: ["string", "null"] }
        businessType: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        contactName: { type: ["string", "null"] }
        vatNumber: { type: ["string", "null"] }
        hasTradeShop: { type: boolean }
        hasMobileWorkforce: { type: boolean }
        appointmentBookingEnabled: { type: boolean }
        multiBranchEnabled: { type: boolean }
        vatRegistered: { type: boolean }
        accountingProvider: { type: ["string", "null"] }
        aiModulesEnabled:
          type: array
          items: { type: string }
        communicationChannels:
          type: array
          items: { type: string }
        posEnabled: { type: boolean }
        brandColor: { type: ["string", "null"] }
        logoUrl: { type: ["string", "null"] }
        logoPortalUrl: { type: ["string", "null"] }
        logoPosUrl: { type: ["string", "null"] }
        faviconUrl: { type: ["string", "null"] }
        primaryColor: { type: ["string", "null"] }
        accentColor: { type: ["string", "null"] }
        surfaceColor: { type: ["string", "null"] }
        fontFamily: { type: ["string", "null"] }
        brandTemplates:
          anyOf:
            - type: "null"
            - $ref: "#/components/schemas/BrandTemplates"
        leadCaptureAllowedOrigins:
          type: array
          items: { type: string }
        tradeCategorySlugs:
          type: array
          items: { type: string }
        parentTenantId: { type: ["string", "null"] }
        require2fa: { type: boolean }
        whiteLabelConfig:
          anyOf:
            - type: "null"
            - $ref: "#/components/schemas/WhiteLabelConfig"

    WhiteLabelConfig:
      type: object
      properties:
        hideCtrlTradeBranding: { type: boolean }
        productName: { type: string }
        supportEmail: { type: string }
        supportPhone: { type: string }
        outboundEmailDomain: { type: string }
        outboundFromName: { type: string }
        outboundFromEmail: { type: string }
        dkimVerified: { type: boolean }
        legalEntity: { type: string }

    WhiteLabelUpdate:
      type: object
      properties:
        parentTenantId: { type: ["string", "null"] }
        whiteLabelConfig:
          anyOf:
            - type: "null"
            - $ref: "#/components/schemas/WhiteLabelConfig"
        reseller:
          anyOf:
            - type: "null"
            - $ref: "#/components/schemas/ResellerProfileInput"

    CustomDomain:
      type: object
      required: [id, tenantId, hostname, kind, status, verificationToken, createdAt]
      properties:
        id: { type: string }
        tenantId: { type: string }
        hostname: { type: string }
        kind: { type: string, description: "portal | app" }
        status: { type: string, description: "pending | verified | failed" }
        verificationToken: { type: string }
        verificationRecord: { type: string, description: "TXT record content to publish" }
        verifiedAt: { type: ["string", "null"], format: date-time }
        lastCheckedAt: { type: ["string", "null"], format: date-time }
        lastError: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    CustomDomainInput:
      type: object
      required: [hostname]
      properties:
        hostname: { type: string, minLength: 3 }
        kind: { type: string, enum: [portal, app] }

    ResellerProfile:
      type: object
      required: [tenantId, revenueSharePct, active]
      properties:
        id: { type: string }
        tenantId: { type: string }
        displayName: { type: ["string", "null"] }
        contactEmail: { type: ["string", "null"] }
        revenueSharePct: { type: integer }
        notes: { type: ["string", "null"] }
        active: { type: boolean }

    ResellerProfileInput:
      type: object
      properties:
        displayName: { type: string }
        contactEmail: { type: string }
        revenueSharePct: { type: integer, minimum: 0, maximum: 100 }
        notes: { type: string }
        active: { type: boolean }

    ChildTenantSummary:
      type: object
      required: [id, name, slug, status, mrr, createdAt, jobsCount, leadsCount, paidRevenuePence]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status: { type: string }
        mrr: { type: number }
        currency: { type: string }
        controlSeats: { type: integer }
        fieldSeats: { type: integer }
        tills: { type: integer }
        jobsCount: { type: integer, description: "Total jobs across all time for this child tenant" }
        leadsCount: { type: integer, description: "Total leads across all time for this child tenant" }
        paidRevenuePence: { type: integer, description: "Sum of paid invoice totals in minor currency units" }
        createdAt: { type: string, format: date-time }

    ResellerDashboard:
      type: object
      required: [tenantId, totalMrr, revenueSharePct, expectedPayoutMrr, currency, children]
      properties:
        tenantId: { type: string }
        displayName: { type: ["string", "null"] }
        totalMrr: { type: number }
        revenueSharePct: { type: integer }
        expectedPayoutMrr: { type: number }
        currency: { type: string }
        children:
          type: array
          items: { $ref: "#/components/schemas/ChildTenantSummary" }

    FranchiseRollup:
      type: object
      required: [parentTenantId, totalMrr, currency, children, totalJobsCount, totalLeadsCount, totalPaidRevenuePence]
      properties:
        parentTenantId: { type: string }
        totalMrr: { type: number }
        currency: { type: string }
        totalJobsCount: { type: integer }
        totalLeadsCount: { type: integer }
        totalPaidRevenuePence: { type: integer }
        children:
          type: array
          items: { $ref: "#/components/schemas/ChildTenantSummary" }

    CreateChildTenantInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 2 }
        slug: { type: string, description: "Optional — auto-generated from name if omitted" }
        country: { type: string }
        inheritWhiteLabel: { type: boolean, description: "Copy parent whiteLabelConfig and brand colors onto the new child" }

    HostInfo:
      type: object
      required: [hostname, matched]
      properties:
        hostname: { type: string }
        matched: { type: boolean }
        tenantId: { type: ["string", "null"] }
        tenantSlug: { type: ["string", "null"] }
        tenantName: { type: ["string", "null"] }
        kind: { type: ["string", "null"] }
        whiteLabelConfig:
          anyOf:
            - type: "null"
            - $ref: "#/components/schemas/WhiteLabelConfig"

    TenantUpdate:
      type: object
      properties:
        name: { type: string }
        country: { type: string }
        phone: { type: string }
        addressLine1: { type: string }
        city: { type: string }
        postcode: { type: string }
        website: { type: string }
        contactName: { type: string }
        vatNumber: { type: string }
        industrySlug: { type: string }
        businessType: { type: string }
        hasTradeShop: { type: boolean }
