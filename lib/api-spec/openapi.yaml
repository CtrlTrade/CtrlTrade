openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CtrlTrade SaaS Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: tenant
  - name: subscription
  - name: billing
  - name: payment
  - name: trade-categories
  - name: pricing
  - name: onboarding
  - name: admin
  - name: customers
  - name: quotes
  - name: jobs
  - name: schedule
  - name: fleet
  - name: compliance
  - name: team
  - name: pos
  - name: invoices
paths:
  /v1/pos/login:
    post:
      operationId: posLogin
      tags: [pos]
      summary: Authenticate a field/control user for the CtrlTradePos till
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSession"

  /v1/pos/me:
    get:
      operationId: getPosSession
      tags: [pos]
      summary: Resolve the current POS session from the bearer token
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSession"

  /v1/pos/jobs:
    get:
      operationId: listPosJobs
      tags: [pos]
      summary: Jobs assigned to the current user for today
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PosJob"

  /v1/pos/sales:
    get:
      operationId: listPosSales
      tags: [pos]
      summary: Recent sales recorded on this till
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PosSale"
    post:
      operationId: createPosSale
      tags: [pos]
      summary: Capture a sale (line items + tender) from the field
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosSaleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSale"

  /v1/pos/sales/{saleId}/receipt:
    post:
      operationId: sendPosReceipt
      tags: [pos]
      parameters:
        - in: path
          name: saleId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosReceiptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosReceiptReceipt"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadUrlRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadUrlResponse" }

  /v1/files:
    get:
      operationId: listFiles
      tags: [files]
      parameters:
        - in: query
          name: parentKind
          required: true
          schema: { type: string }
        - in: query
          name: parentId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FileMeta" }
    post:
      operationId: createFile
      tags: [files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FileInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileMeta" }

  /v1/files/{fileId}:
    delete:
      operationId: deleteFile
      tags: [files]
      parameters:
        - in: path
          name: fileId
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }

  /v1/branding:
    get:
      operationId: getBranding
      tags: [branding]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branding" }
    patch:
      operationId: updateBranding
      tags: [branding]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BrandingUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branding" }

  /v1/usage:
    get:
      operationId: getTenantUsage
      tags: [usage]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantUsage" }

  /v1/admin/workers:
    get:
      operationId: getAdminWorkers
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminWorkers" }

  /v1/admin/workers/{jobId}/retry:
    post:
      operationId: retryAdminWorkerJob
      tags: [admin]
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminWorkerJob" }

  /v1/admin/usage:
    get:
      operationId: getAdminUsage
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUsage" }

  /v1/pos/branding:
    get:
      operationId: getPosBranding
      tags: [pos]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branding" }

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/pricing:
    get:
      operationId: getPricing
      tags: [pricing]
      summary: Public pricing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pricing"

  /v1/trade-categories:
    get:
      operationId: listTradeCategories
      tags: [trade-categories]
      summary: List trade categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeCategory"

  /v1/auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create tenant, owner user, and trial subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupPayload"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /v1/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "204":
          description: Logged out

  /v1/auth/me:
    get:
      operationId: getSession
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /v1/payment/setup-intent:
    post:
      operationId: createSetupIntent
      tags: [payment]
      summary: Create Stripe SetupIntent for saving a payment method during signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupIntentInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupIntent"

  /v1/tenant:
    get:
      operationId: getTenant
      tags: [tenant]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenant]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /v1/tenant/cancel:
    post:
      operationId: cancelTenant
      tags: [tenant]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancellationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationReceipt"

  /v1/tenant/sync-stripe:
    post:
      operationId: syncTenantFromStripe
      tags: [tenant]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/subscription:
    get:
      operationId: getSubscription
      tags: [subscription]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
    patch:
      operationId: updateSubscriptionQuantities
      tags: [subscription]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionQuantities"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/subscription/reactivate:
    post:
      operationId: reactivateSubscription
      tags: [subscription]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/billing/overview:
    get:
      operationId: getBillingOverview
      tags: [billing]
      summary: Subscription, plan items, payment method, and upcoming invoice
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingOverview"

  /v1/billing/invoices:
    get:
      operationId: listBillingInvoices
      tags: [billing]
      summary: List past invoices for the tenant
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingInvoice"

  /v1/billing/update-payment-method:
    post:
      operationId: createBillingPaymentMethodSetup
      tags: [billing]
      summary: Create a SetupIntent so the tenant can update their card
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingSetupIntent"

  /v1/onboarding:
    get:
      operationId: getOnboarding
      tags: [onboarding]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"

  /v1/admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /v1/admin/activity:
    get:
      operationId: getAdminActivity
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /v1/admin/revenue-breakdown:
    get:
      operationId: getRevenueBreakdown
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueBreakdown"

  /v1/admin/upcoming-renewals:
    get:
      operationId: getUpcomingRenewals
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingRenewal"

  /v1/admin/tenants:
    get:
      operationId: listAdminTenants
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTenantSummary"

  /v1/admin/tenants/{tenantId}:
    get:
      operationId: getAdminTenant
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantDetail"

  /v1/admin/tenants/{tenantId}/quantities:
    patch:
      operationId: adminUpdateTenantQuantities
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionQuantities"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/admin/tenants/{tenantId}/cancel:
    post:
      operationId: adminCancelTenant
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/admin/tenants/{tenantId}/reactivate:
    post:
      operationId: adminReactivateTenant
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/admin/tenants/{tenantId}/sync-stripe:
    post:
      operationId: adminSyncTenant
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /v1/team:
    get:
      operationId: listTeam
      tags: [team]
      summary: List members of current tenant
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamOverview" }

  /v1/team/seat-usage:
    get:
      operationId: getSeatUsage
      tags: [team]
      summary: Seat usage (assigned vs subscribed) for the current tenant
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeatUsage" }

  /v1/team/invitations:
    post:
      operationId: inviteTeamMember
      tags: [team]
      summary: Invite a new member by email (magic-link)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InviteMemberBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InvitationRecord" }

  /v1/team/invitations/{invitationId}/resend:
    post:
      operationId: resendInvitation
      tags: [team]
      parameters:
        - in: path
          name: invitationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InvitationRecord" }

  /v1/team/invitations/{invitationId}:
    delete:
      operationId: revokeInvitation
      tags: [team]
      parameters:
        - in: path
          name: invitationId
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }

  /v1/team/members/{userId}:
    patch:
      operationId: updateMember
      tags: [team]
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMemberInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamMember" }
    delete:
      operationId: removeMember
      tags: [team]
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }

  /v1/team/members/{userId}/password-reset:
    post:
      operationId: sendMemberPasswordReset
      tags: [team]
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetIssued" }

  /v1/public/invitations/{token}:
    get:
      operationId: getInvitation
      tags: [team]
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicInvitationPreview" }

  /v1/public/invitations/{token}/accept:
    post:
      operationId: acceptInvitation
      tags: [team]
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcceptInvitationInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /v1/public/auth/forgot-password:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetIssued" }

  /v1/public/auth/reset-password:
    post:
      operationId: completePasswordReset
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetCompleted" }

  /v1/admin/tenants/{tenantId}/impersonate:
    post:
      operationId: startImpersonation
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /v1/admin/impersonation/stop:
    post:
      operationId: stopImpersonation
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /v1/admin/tenants/{tenantId}/billing-override:
    patch:
      operationId: adminBillingOverride
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BillingOverrideBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Subscription" }

  /v1/admin/tenants/{tenantId}/gdpr-export:
    get:
      operationId: adminGdprExport
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ZIP archive
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /v1/admin/tenants/{tenantId}/gdpr-deletion:
    get:
      operationId: getGdprDeletion
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GdprDeletionState" }
    post:
      operationId: scheduleGdprDeletion
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScheduleGdprDeletionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GdprDeletionState" }
    delete:
      operationId: cancelGdprDeletion
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GdprDeletionState" }

  /v1/admin/tenants/{tenantId}/gdpr-deletion/purge:
    post:
      operationId: purgeGdprDeletion
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GdprDeletionState" }

  /v1/admin/feature-flags:
    get:
      operationId: listFeatureFlags
      tags: [admin]
      parameters:
        - in: query
          name: tenantId
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FeatureFlagRecord" }
    post:
      operationId: upsertFeatureFlag
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertFeatureFlagInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeatureFlagRecord" }

  /v1/admin/feature-flags/{flagId}:
    delete:
      operationId: deleteFeatureFlag
      tags: [admin]
      parameters:
        - in: path
          name: flagId
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }

  /v1/dashboard/expiry-attention:
