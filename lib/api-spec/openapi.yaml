  /v1/fleet/vehicles/{vehicleId}/location:
    parameters:
      - in: path
        name: vehicleId
        required: true
        schema: { type: string }
    post:
      operationId: recordVehicleLocation
      tags: [fleet]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VehicleLocationInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VehicleLocation" }

  /v1/fleet/locations:
    get:
      operationId: listLatestVehicleLocations
      tags: [fleet]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/VehicleLocation" }

  /v1/compliance/certificates:
    get:
      operationId: listCertificates
      tags: [compliance]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Certificate" }
    post:
      operationId: createCertificate
      tags: [compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CertificateInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Certificate" }

  /v1/compliance/certificates/{certificateId}:
    parameters:
      - in: path
        name: certificateId
        required: true
        schema: { type: string }
    patch:
      operationId: updateCertificate
      tags: [compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CertificateInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Certificate" }
    delete:
      operationId: deleteCertificate
      tags: [compliance]
      responses:
        "204": { description: Deleted }

  /v1/admin/tenants/{tenantId}/audit-log:
    get:
      operationId: getAdminTenantAuditLog
      tags: [admin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Pricing:
      type: object
      required: [currency, controlSeat, fieldSeat, till, trialDays]
      properties:
        currency: { type: string }
        controlSeat: { $ref: "#/components/schemas/PricedItem" }
        fieldSeat: { $ref: "#/components/schemas/PricedItem" }
        till: { $ref: "#/components/schemas/PricedItem" }
        trialDays: { type: integer }

    PricedItem:
      type: object
      required: [name, amount, currency, interval, features]
      properties:
        name: { type: string }
        amount: { type: number }
        currency: { type: string }
        interval: { type: string }
        features:
          type: array
          items: { type: string }

    TradeCategory:
      type: object
      required: [id, slug, name, jobTypes]
      properties:
        id: { type: string }
        slug: { type: string }
        name: { type: string }
        jobTypes:
          type: array
          items: { type: string }

    SignupPayload:
      type: object
      required: [company, ownerName, ownerEmail, ownerPassword, controlSeats, fieldSeats, tills, tradeCategorySlugs, paymentMethodId]
      properties:
        company:
          type: object
          required: [name]
          properties:
            name: { type: string, minLength: 1 }
            country: { type: string }
            companyNumber: { type: ["string", "null"] }
            phone: { type: ["string", "null"] }
