          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }

  /v1/quotes/{quoteId}:
    parameters:
      - in: path
        name: quoteId
        required: true
        schema: { type: string }
    get:
      operationId: getQuote
      tags: [quotes]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }
    patch:
      operationId: updateQuote
      tags: [quotes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuoteInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Quote" }

  /v1/quotes/{quoteId}/send:
    parameters:
      - in: path
        name: quoteId
        required: true
        schema: { type: string }
    post:
      operationId: sendQuote
      tags: [quotes]
      responses:
        "200":
          description: OK
          content:
            application/json:
