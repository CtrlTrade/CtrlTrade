openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CtrlTrade SaaS Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: tenant
  - name: subscription
  - name: billing
  - name: payment
  - name: trade-categories
  - name: pricing
  - name: onboarding
  - name: admin
  - name: customers
  - name: quotes
  - name: jobs
  - name: schedule
  - name: fleet
  - name: compliance
  - name: team
  - name: pos
  - name: invoices
  - name: integrations
  - name: branches
  - name: area-managers
  - name: projects
paths:
  /v1/branches:
    get:
      operationId: listBranches
      tags: [branches]
      summary: List branches for the current tenant.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Branch" }
    post:
      operationId: createBranch
      tags: [branches]
      summary: Create a new branch.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BranchInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branch" }

  /v1/branches/{id}:
    get:
      operationId: getBranch
      tags: [branches]
      summary: Get a branch with staff, job, and revenue stats.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BranchDetail" }
    put:
      operationId: updateBranch
      tags: [branches]
      summary: Update a branch.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BranchInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branch" }
    delete:
      operationId: deleteBranch
      tags: [branches]
      summary: Delete a branch.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /v1/area-managers:
    get:
      operationId: listAreaManagers
      tags: [area-managers]
      summary: List area managers for the current tenant.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AreaManager" }
    post:
      operationId: createAreaManager
      tags: [area-managers]
      summary: Assign a staff member as an area manager.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AreaManagerInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AreaManager" }

  /v1/area-managers/{id}:
    get:
      operationId: getAreaManager
      tags: [area-managers]
      summary: Get a specific area manager.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AreaManager" }
    put:
      operationId: updateAreaManager
      tags: [area-managers]
      summary: Update an area manager's branch assignments.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AreaManagerInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AreaManager" }
    delete:
      operationId: deleteAreaManager
      tags: [area-managers]
      summary: Remove area manager assignment.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /v1/integrations/providers:
    get:
      operationId: listIntegrationProviders
      tags: [integrations]
      summary: List all available integration providers and their availability.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/IntegrationProvider" }

  /v1/integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List the current tenant's integration connections.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TenantIntegration" }

  /v1/integrations/{provider}/connect:
    post:
      operationId: connectIntegration
      tags: [integrations]
      summary: Start the OAuth handshake for the given provider.
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [authUrl]
                properties:
                  authUrl: { type: string }

  /v1/integrations/{provider}:
    delete:
      operationId: disconnectIntegration
      tags: [integrations]
      summary: Disconnect the integration (tokens are revoked locally).
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /v1/integrations/{provider}/apikey:
    post:
      operationId: connectIntegrationApiKey
      tags: [integrations]
      summary: Connect an API-key-based integration (MyJobQuote, Checkatrade).
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConnectApiKeyBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantIntegration" }

  /v1/integrations/{provider}/sync:
    post:
      operationId: triggerIntegrationSync
      tags: [integrations]
      summary: Queue a manual sync for the given provider.
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [enqueued]
                properties:
                  enqueued: { type: boolean }

  /v1/integrations/{provider}/webhook-info:
    get:
      operationId: getIntegrationWebhookInfo
      tags: [integrations]
      summary: Return the webhook URL and secret for a connected lead-import integration.
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [webhookUrl, hasApiKey]
                properties:
                  webhookUrl: { type: string }
                  webhookSecret: { type: ["string", "null"] }
                  hasApiKey: { type: boolean }

  /v1/integrations/{provider}/webhook-secret/rotate:
    post:
      operationId: rotateIntegrationWebhookSecret
      tags: [integrations]
      summary: Generate a new webhook secret for a lead-import integration.
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [webhookUrl, webhookSecret]
                properties:
                  webhookUrl: { type: string }
                  webhookSecret: { type: string }

  /v1/webhooks/leads/{provider}/{tenantId}:
    post:
      operationId: receiveLeadWebhook
      tags: [integrations]
      summary: >
        Receive a real-time lead push from MyJobQuote or Checkatrade.
        Authenticated via the X-Webhook-Secret header — the secret is shown
        in the integration settings after connecting.
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string, enum: [myjobquote, checkatrade] }
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
        - in: header
          name: X-Webhook-Secret
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadWebhookPayload"
      responses:
        "200":
          description: OK — lead imported or already existed.
          content:
            application/json:
              schema:
                type: object
                required: [imported]
                properties:
                  imported: { type: boolean }
                  reason: { type: string }
        "401":
          description: Bad or missing webhook secret.
        "422":
          description: Payload is missing required fields.

  /v1/integrations/{provider}/logs:
    get:
      operationId: getIntegrationLogs
      tags: [integrations]
      summary: Recent sync log entries for a provider.
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/IntegrationSyncLog" }

  /v1/admin/integration-catalogue:
    get:
      operationId: listAdminIntegrationCatalogue
      tags: [admin, integrations]
      summary: List the integration catalogue (super admin).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminIntegrationCatalogueEntry" }

  /v1/admin/integration-catalogue/{provider}:
    put:
      operationId: updateAdminIntegrationCatalogue
      tags: [admin, integrations]
      summary: Enable, disable, or restrict a provider in the catalogue.
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminIntegrationCatalogueInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [provider, enabled]
                properties:
                  provider: { type: string }
                  enabled: { type: boolean }
                  minPlan: { type: ["string", "null"] }
                  updatedAt: { type: string, format: date-time }

  /v1/pos/login:
    post:
      operationId: posLogin
      tags: [pos]
      summary: Authenticate a field/control user for the CtrlTradePos till
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosLoginCredentials"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSession"

  /v1/pos/me:
    get:
      operationId: getPosSession
      tags: [pos]
      summary: Resolve the current POS session from the bearer token
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSession"

  /v1/pos/jobs:
    get:
      operationId: listPosJobs
      tags: [pos]
      summary: Jobs assigned to the current user for today
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PosJob"

  /v1/pos/sales:
    get:
      operationId: listPosSales
      tags: [pos]
      summary: Recent sales recorded on this till
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PosSale"
    post:
      operationId: createPosSale
      tags: [pos]
      summary: Capture a sale (line items + tender) from the field
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosSaleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSale"

  /v1/pos/sales/{saleId}/receipt:
    post:
      operationId: sendPosReceipt
      tags: [pos]
      parameters:
        - in: path
          name: saleId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosReceiptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosReceiptReceipt"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadUrlRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadUrlResponse" }

  /v1/files:
    get:
      operationId: listFiles
      tags: [files]
      parameters:
        - in: query
          name: parentKind
          required: true
          schema: { type: string }
        - in: query
          name: parentId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FileMeta" }
    post:
      operationId: createFile
      tags: [files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FileInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileMeta" }

  /v1/files/{fileId}:
    delete:
      operationId: deleteFile
      tags: [files]
      parameters:
        - in: path
          name: fileId
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }

  /v1/branding:
    get:
      operationId: getBranding
      tags: [branding]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branding" }
    patch:
      operationId: updateBranding
      tags: [branding]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BrandingUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branding" }

  /v1/usage:
    get:
      operationId: getTenantUsage
      tags: [usage]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantUsage" }

  /v1/admin/workers:
    get:
      operationId: getAdminWorkers
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminWorkers" }

  /v1/admin/workers/{jobId}/retry:
    post:
      operationId: retryAdminWorkerJob
      tags: [admin]
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminWorkerJob" }

  /v1/admin/usage:
    get:
      operationId: getAdminUsage
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUsage" }

  /v1/pos/branding:
    get:
      operationId: getPosBranding
      tags: [pos]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branding" }

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/pricing:
    get:
      operationId: getPricing
      tags: [pricing]
      summary: Public pricing
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pricing"

  /v1/industries:
    get:
      operationId: listIndustries
      tags: [tenant]
      summary: List all industries for the signup wizard
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Industry"

  /v1/industries/{slug}:
    get:
      operationId: getIndustryDetail
      tags: [tenant]
      summary: Get full industry detail with job types, checklists, etc.
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndustryDetail"

  /v1/tenant/modules:
    get:
      operationId: getTenantModules
      tags: [tenant]
      summary: Get the tenant's active module configuration
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantModules"
    patch:
      operationId: updateTenantModules
      tags: [tenant]
      summary: Update tenant module flags and optionally trigger provisioning for newly enabled modules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantModules"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantModules"

  /v1/admin/industries:
    get:
      operationId: adminListIndustries
      tags: [admin]
      summary: Super admin — list all industries with full content
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IndustryDetail"

  /v1/admin/industries/{id}/job-types:
    post:
      operationId: adminAddIndustryJobType
      tags: [admin]
      summary: Add a job type to an industry template
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IndustryJobTypeInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IndustryDetail" }

  /v1/admin/industries/{id}/job-types/{itemId}:
    delete:
      operationId: adminRemoveIndustryJobType
      tags: [admin]
      summary: Remove a job type from an industry template
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /v1/admin/industries/{id}/checklists:
    post:
      operationId: adminAddIndustryChecklist
      tags: [admin]
      summary: Add a checklist to an industry template
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IndustryChecklistInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IndustryDetail" }

  /v1/admin/industries/{id}/checklists/{itemId}:
    delete:
      operationId: adminRemoveIndustryChecklist
      tags: [admin]
      summary: Remove a checklist from an industry template
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /v1/admin/industries/{id}/document-templates:
    post:
      operationId: adminAddIndustryDocumentTemplate
      tags: [admin]
      summary: Add a compliance doc template to an industry
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IndustryDocumentTemplateInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IndustryDetail" }

  /v1/admin/industries/{id}/document-templates/{itemId}:
    delete:
      operationId: adminRemoveIndustryDocumentTemplate
      tags: [admin]
      summary: Remove a compliance doc template from an industry
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      responses:
        "204": { description: No content }

  /v1/trade-categories:
    get:
      operationId: listTradeCategories
      tags: [trade-categories]
      summary: List trade categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeCategory"

  /v1/auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create tenant, owner user, and trial subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupPayload"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /v1/auth/2fa/setup:
    get:
      operationId: get2faSetup
      tags: [auth]
      summary: Generate a TOTP secret and QR code URI for enrolment
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpSetup"

  /v1/auth/2fa/verify-enrol:
    post:
      operationId: verifyEnrol2fa
      tags: [auth]
      summary: Verify a TOTP code and activate 2FA for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpCodeInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpEnrolResult"

  /v1/auth/2fa:
    delete:
      operationId: disable2fa
      tags: [auth]
      summary: Disable 2FA for the current user (requires current TOTP code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpCodeInput"
      responses:
        "204":
          description: Disabled

  /v1/auth/2fa/recovery-codes:
    get:
      operationId: get2faRecoveryCodes
      tags: [auth]
      summary: Get the current user's recovery codes (shown only once after enrolment)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpRecoveryCodes"

  /v1/auth/2fa/challenge:
    post:
      operationId: submit2faChallenge
      tags: [auth]
